---
layout: default
---

<article class="article">
    <h1>{{ page.title }}</h1>
    <p>
    {% for tag in page.tags %}
    <a href="/tags.html#{{ tag }}" class="tag">{{ tag }}</a>
    {% endfor %}
</p>

    <div class="content">
        {{ content }}
        <h3>Related Articles</h3>

<div class="grid">
{% for post in site.posts limit:3 %}
    {% if post.url != page.url %}
    <div class="card">
        <h4><a href="{{ post.url }}">{{ post.title }}</a></h4>
    </div>
    {% endif %}
{% endfor %}
</div>
    </div>
</article>
