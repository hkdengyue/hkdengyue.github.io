---
layout: default
title: Tags
---

<h2>All Tags</h2>

{% assign tags = site.tags %}

{% for tag in tags %}
<h3 id="{{ tag[0] }}">{{ tag[0] }}</h3>

<div class="main-list">
    {% for post in tag[1] %}
    <div class="card horizontal">

        {% if post.image %}
        <img src="{{ post.image }}" class="thumb-horizontal">
        {% endif %}

        <div class="card-content">
            <h3><a href="{{ post.url }}">{{ post.title }}</a></h3>
        </div>

    </div>
    {% endfor %}
</div>

{% endfor %}
